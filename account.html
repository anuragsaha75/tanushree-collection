<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Account — Tanushree Collections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--dark); }

    .account-wrapper { min-height: 100vh; padding: 2rem 1rem 4rem; max-width: 820px; margin: 0 auto; }

    .account-card { background: var(--dark-2); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 2rem; }

    .account-header { background: linear-gradient(135deg, var(--dark-3), var(--dark-4)); padding: 2rem; text-align: center; border-bottom: 1px solid var(--border); }

    .avatar { width: 70px; height: 70px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--dark); margin: 0 auto 1rem; }

    .account-body { padding: 2rem; }

    .account-field { background: var(--dark-3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem 1.2rem; margin-bottom: 0.85rem; }
    .account-field .field-label { font-size: 0.7rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.25rem; }
    .account-field .field-value { font-size: 0.95rem; color: var(--cream); word-break: break-all; overflow-wrap: anywhere; }

    /* Editable field styles */
    .account-field.editable { position: relative; }
    .account-field.editable .field-value-display { font-size: 0.95rem; color: var(--cream); }
    .edit-input {
      width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--gold);
      color: var(--cream); font-family: 'Jost', sans-serif; font-size: 0.95rem;
      padding: 0.1rem 0; outline: none; transition: border-color 0.3s;
      display: none;
    }
    .edit-input:focus { border-bottom-color: var(--gold); }
    .edit-mode .field-value-display { display: none; }
    .edit-mode .edit-input { display: block; }

    /* Edit / Save button row */
    .profile-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .btn-outline {
      flex: 1; min-width: 120px; background: transparent;
      border: 1px solid var(--border); color: var(--cream);
      border-radius: var(--radius-sm); padding: 0.75rem 1.5rem;
      font-family: 'Jost', sans-serif; font-size: 0.92rem; cursor: pointer;
      transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-save {
      flex: 1; min-width: 120px;
    }

    .loading-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    .loading-ring { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ORDER HISTORY */
    .orders-section { margin-top: 2rem; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 1.5rem; }

    .order-card { background: var(--dark-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }

    .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .order-id { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.1em; }
    .order-date { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.2rem; }
    .order-total-badge { font-size: 1.1rem; font-weight: 600; color: var(--gold); }

    .status-badge { border-radius: 99px; padding: 0.25rem 0.85rem; font-size: 0.72rem; letter-spacing: 0.08em; font-weight: 600; display: inline-block; }
    .status-pending   { background: rgba(255,193,7,0.15); color: #ffc107; border: 1px solid rgba(255,193,7,0.3); }
    .status-accepted  { background: rgba(33,150,243,0.15); color: #42a5f5; border: 1px solid rgba(33,150,243,0.3); }
    .status-delivered { background: rgba(76,175,128,0.15); color: #4caf82; border: 1px solid rgba(76,175,128,0.3); }
    .status-rejected  { background: rgba(224,82,82,0.15); color: #e05252; border: 1px solid rgba(224,82,82,0.3); }

    /* ORDER TRACKING BAR */
    .tracking-bar { display: flex; align-items: center; margin: 1.25rem 0; }
    .track-step {
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
      flex: 1; position: relative;
    }
    .track-step::after {
      content: ''; position: absolute; top: 14px; left: 50%; width: 100%;
      height: 2px; background: var(--border); z-index: 0;
    }
    .track-step:last-child::after { display: none; }
    .track-dot {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border);
      background: var(--dark-3); display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; z-index: 1; position: relative; transition: all 0.3s;
    }
    .track-dot.done { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 700; }
    .track-dot.current { background: transparent; border-color: var(--gold); color: var(--gold); }
    .track-label { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); text-align: center; }
    .track-label.done { color: var(--gold); }
    .track-step.done-line::after { background: var(--gold); }

    .order-items-list { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem; }
    .order-item-chip { display: flex; align-items: center; gap: 0.5rem; background: var(--dark-3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.4rem 0.75rem; font-size: 0.82rem; }
    .order-item-chip img { width: 32px; height: 32px; object-fit: cover; border-radius: 4px; }

    .empty-orders { text-align: center; padding: 3rem; color: var(--text-muted); background: var(--dark-2); border: 1px solid var(--border); border-radius: var(--radius); }
  </style>
</head>
<body>
<div id="toastContainer"></div>

<!-- NAV -->
<nav class="tc-nav">
  <div class="brand-name" style="font-size:1.2rem;">Tanushree Collections</div>
  <div class="nav-links">
    <a href="index.html">Shop</a>
    <a href="account.html" style="color:var(--gold);">Account</a>
  </div>
</nav>

<div class="account-wrapper">

  <!-- Loading state -->
  <div id="loadingState" class="loading-state">
    <div class="loading-ring"></div>
    <p>Loading your account...</p>
  </div>

  <!-- Account content -->
  <div id="accountContent" style="display:none;">

    <!-- Profile Card -->
    <div class="account-card">
      <div class="account-header">
        <div class="avatar" id="avatarInitial">?</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;" id="headerName">—</div>
        <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.25rem;">Member Account</div>
      </div>
      <div class="account-body">

        <!-- Full Name (editable) -->
        <div class="account-field editable" id="fieldName">
          <div class="field-label">Full Name</div>
          <div class="field-value-display" id="dispName">—</div>
          <input class="edit-input" type="text" id="inputName" placeholder="Enter your name" autocomplete="name">
        </div>

        <!-- Email (read-only) -->
        <div class="account-field">
          <div class="field-label">Email Address</div>
          <div class="field-value" id="dispEmail">—</div>
        </div>

        <!-- Phone (editable) -->
        <div class="account-field editable" id="fieldPhone">
          <div class="field-label">Phone Number</div>
          <div class="field-value-display" id="dispPhone">—</div>
          <input class="edit-input" type="tel" id="inputPhone" placeholder="+91 98765 43210" autocomplete="tel">
        </div>

        <!-- Member Since (read-only) -->
        <div class="account-field">
          <div class="field-label">Member Since</div>
          <div class="field-value" id="dispDate">—</div>
        </div>

        <!-- Sign-in Provider (read-only) -->
        <div class="account-field">
          <div class="field-label">Sign-in Provider</div>
          <div class="field-value" id="dispProvider">—</div>
        </div>

        <!-- Action buttons -->
        <div class="profile-actions">
          <!-- Edit mode OFF: show Edit button -->
          <button class="btn-outline" id="btnEdit" onclick="enterEditMode()">✎ Edit Profile</button>

          <!-- Edit mode ON: show Save + Cancel -->
          <button class="btn-gold btn-save" id="btnSave" style="display:none;" onclick="saveProfile()">
            <span class="spinner" id="saveSpinner"></span>
            <span id="saveBtnText">Save Changes</span>
          </button>
          <button class="btn-outline" id="btnCancel" style="display:none;" onclick="cancelEditMode()">Cancel</button>
        </div>

        <div class="gold-line"></div>
        <button class="btn-gold" style="background:linear-gradient(135deg,#c0392b,#922b21);" onclick="doLogout()">Sign Out</button>
        <div style="text-align:center;margin-top:1rem;">
          <a href="index.html" style="color:var(--gold);font-size:0.85rem;text-decoration:none;">← Continue Shopping</a>
        </div>
      </div>
    </div>

    <!-- Order History -->
    <div class="orders-section">
      <div class="section-title">Order History</div>
      <div id="ordersLoading" style="text-align:center;padding:2rem;color:var(--text-muted);">
        <div class="loading-ring"></div>
      </div>
      <div id="ordersList"></div>
    </div>

  </div>
</div>

<!-- Firebase SDKs BEFORE firebase-init.js -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-init.js"></script>

<script>
const STATUS_STEPS = ['Pending', 'Accepted', 'Delivered'];

// Keep reference to current Firebase user
let currentUser = null;

function getTrackingHTML(status) {
  const rejected = status === 'Rejected';
  if (rejected) {
    return `<div style="margin:1rem 0;display:flex;align-items:center;gap:0.5rem;">
      <span class="status-badge status-rejected">✕ Order Rejected</span>
    </div>`;
  }
  const currentIndex = STATUS_STEPS.indexOf(status);
  let html = '<div class="tracking-bar">';
  STATUS_STEPS.forEach((step, i) => {
    const isDone    = i < currentIndex;
    const isCurrent = i === currentIndex;
    const dotClass  = isDone ? 'done' : (isCurrent ? 'current' : '');
    const labelClass= (isDone || isCurrent) ? 'done' : '';
    const lineClass = isDone ? 'done-line' : '';
    const icon      = isDone ? '✓' : (i + 1);
    html += `<div class="track-step ${lineClass}">
      <div class="track-dot ${dotClass}">${icon}</div>
      <div class="track-label ${labelClass}">${step}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function waitForFirebase(callback) {
  if (window.auth && window.db) {
    callback();
  } else {
    setTimeout(() => waitForFirebase(callback), 50);
  }
}

// Format date like "16 May 2026"
function formatDate(dateInput) {
  let d;
  if (!dateInput) return '—';
  if (dateInput instanceof Date) {
    d = dateInput;
  } else if (dateInput.toDate) {
    d = dateInput.toDate();
  } else if (dateInput.seconds) {
    d = new Date(dateInput.seconds * 1000);
  } else if (typeof dateInput === 'string') {
    d = new Date(dateInput);
  } else {
    return '—';
  }
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
}

// ── Edit / Save / Cancel ──
function enterEditMode() {
  // Populate inputs with current display values
  document.getElementById('inputName').value  = document.getElementById('dispName').innerText  !== '—' ? document.getElementById('dispName').innerText  : '';
  document.getElementById('inputPhone').value = document.getElementById('dispPhone').innerText !== '—' ? document.getElementById('dispPhone').innerText : '';

  // Toggle editable fields
  document.getElementById('fieldName').classList.add('edit-mode');
  document.getElementById('fieldPhone').classList.add('edit-mode');

  // Toggle buttons
  document.getElementById('btnEdit').style.display   = 'none';
  document.getElementById('btnSave').style.display   = '';
  document.getElementById('btnCancel').style.display = '';

  document.getElementById('inputName').focus();
}

function cancelEditMode() {
  document.getElementById('fieldName').classList.remove('edit-mode');
  document.getElementById('fieldPhone').classList.remove('edit-mode');

  document.getElementById('btnEdit').style.display   = '';
  document.getElementById('btnSave').style.display   = 'none';
  document.getElementById('btnCancel').style.display = 'none';
}

async function saveProfile() {
  if (!currentUser) return;

  const newName  = document.getElementById('inputName').value.trim();
  const newPhone = document.getElementById('inputPhone').value.trim();

  if (!newName) {
    showToast('Name cannot be empty.', 'error');
    return;
  }

  // Disable button & show spinner
  const btnSave = document.getElementById('btnSave');
  const spinner = document.getElementById('saveSpinner');
  const btnText = document.getElementById('saveBtnText');
  btnSave.disabled = true;
  spinner.classList.add('show');
  btnText.textContent = 'Saving...';

  try {
    // Update Firestore
    await window.db.collection('users').doc(currentUser.uid).set(
      { name: newName, phone: newPhone },
      { merge: true }
    );

    // Update Firebase Auth displayName
    await currentUser.updateProfile({ displayName: newName });

    // Update UI display values
    document.getElementById('dispName').innerText  = newName;
    document.getElementById('dispPhone').innerText = newPhone || '—';
    document.getElementById('headerName').innerText = newName;
    document.getElementById('avatarInitial').innerText = newName.charAt(0).toUpperCase();

    showToast('Profile updated successfully!');
    cancelEditMode();

  } catch (err) {
    console.error('Save profile error:', err);
    showToast(err.message || 'Failed to save. Please try again.', 'error');
  } finally {
    btnSave.disabled = false;
    spinner.classList.remove('show');
    btnText.textContent = 'Save Changes';
  }
}

waitForFirebase(() => {

  window.auth.onAuthStateChanged(async user => {

    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    currentUser = user;

    try {
      const doc = await window.db.collection('users').doc(user.uid).get();

      let userData = {};

      if (doc.exists) {
        userData = doc.data();
      } else {
        userData = {
          name: user.displayName || user.email.split('@')[0],
          email: user.email,
          phone: user.phoneNumber || '',
          provider: user.providerData[0]?.providerId || 'unknown',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        await window.db.collection('users').doc(user.uid).set(userData);
      }

      // ✅ Load orders
      loadOrders(user.uid);

      // ✅ SHOW UI
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('accountContent').style.display = 'block';

      // ✅ Fill user data
      document.getElementById('dispName').innerText  = userData.name  || '—';
      document.getElementById('dispEmail').innerText = userData.email || '—';
      document.getElementById('dispPhone').innerText = userData.phone || '—';
      document.getElementById('headerName').innerText = userData.name || 'User';
      document.getElementById('avatarInitial').innerText = (userData.name || 'U').charAt(0).toUpperCase();

      // Member Since — prefer Firestore createdAt, fall back to Firebase Auth metadata
      let memberSince = '—';
      if (userData.createdAt && userData.createdAt.toDate) {
        memberSince = formatDate(userData.createdAt.toDate());
      } else if (userData.createdAt && userData.createdAt.seconds) {
        memberSince = formatDate(new Date(userData.createdAt.seconds * 1000));
      } else if (user.metadata && user.metadata.creationTime) {
        memberSince = formatDate(new Date(user.metadata.creationTime));
      }
      document.getElementById('dispDate').innerText = memberSince;

      // Provider
      const providerId = userData.provider || user.providerData[0]?.providerId || 'unknown';
      const providerMap = {
        'google.com': 'Google',
        'emailLink':  'Magic Link (Email)',
        'password':   'Email & Password',
        'unknown':    'Unknown'
      };
      document.getElementById('dispProvider').innerText = providerMap[providerId] || providerId;

    } catch (err) {
      console.error('Account load error:', err);
    }

  });

});

async function loadOrders(uid) {
  const ordersEl  = document.getElementById('ordersList');
  const loadingEl = document.getElementById('ordersLoading');
  if (loadingEl) loadingEl.style.display = 'none';

  try {
    let snap;
    try {
      snap = await window.db.collection('orders')
        .where('userId', '==', uid)
        .orderBy('createdAt', 'desc')
        .get();
    } catch (e) {
      // Fallback without orderBy if index not ready
      snap = await window.db.collection('orders').where('userId', '==', uid).get();
    }

    if (snap.empty) {
      ordersEl.innerHTML = `<div class="empty-orders">
        <div style="font-size:2rem;margin-bottom:0.75rem;">🛍</div>
        <p style="font-size:1rem;margin-bottom:0.5rem;">No orders yet</p>
        <p style="font-size:0.85rem;">Your order history will appear here.</p>
        <a href="index.html" class="btn-gold" style="display:inline-flex;margin-top:1.5rem;width:auto;padding:0.6rem 1.5rem;text-decoration:none;">Start Shopping</a>
      </div>`;
      return;
    }

    // Sort client-side if we used fallback
    const docs = snap.docs.slice().sort((a, b) => {
      const aTime = a.data().createdAt?.seconds || 0;
      const bTime = b.data().createdAt?.seconds || 0;
      return bTime - aTime;
    });

    ordersEl.innerHTML = docs.map(doc => {
      const o = doc.data();
      const status      = o.status || 'Pending';
      const statusClass = 'status-' + status.toLowerCase();
      let date = '—';
      if (o.createdAt?.toDate) {
        date = o.createdAt.toDate().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      } else if (o.createdAt?.seconds) {
        date = new Date(o.createdAt.seconds * 1000).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      }

      const itemsHTML = (o.cart || []).map(item => `
        <div class="order-item-chip">
          <img src="${item.images?.[0] || 'no-image.png'}" alt="${item.name}" onerror="this.src='no-image.png'">
          <span>${item.name} ×${item.quantity}</span>
        </div>
      `).join('');

      return `<div class="order-card">
        <div class="order-top">
          <div>
            <div class="order-id">ORDER #${doc.id.slice(-8).toUpperCase()}</div>
            <div class="order-date">${date} · ${o.payment || 'COD'}</div>
          </div>
          <div style="text-align:right;">
            <span class="status-badge ${statusClass}">${status}</span>
            <div class="order-total-badge" style="margin-top:0.4rem;">₹${o.total || 0}</div>
          </div>
        </div>
        ${getTrackingHTML(status)}
        <div class="order-items-list">${itemsHTML}</div>
        <div style="margin-top:0.75rem;font-size:0.8rem;color:var(--text-muted);">
          📍 ${o.address || '—'}
        </div>
      </div>`;
    }).join('');

  } catch (err) {
    console.warn('loadOrders error:', err.message);
    ordersEl.innerHTML = `<div class="empty-orders"><p>Could not load orders.</p></div>`;
  }
}

function doLogout() {
  window.auth.signOut().then(() => window.location.href = 'login.html');
}
</script>
</body>
</html>
