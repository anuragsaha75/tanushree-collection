<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout — Tanushree Collections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .checkout-layout {
      max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem 4rem;
      display: grid; grid-template-columns: 1fr 360px; gap: 1.5rem;
    }

    .payment-option {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1rem; background: var(--dark-3);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; margin-bottom: 0.5rem; transition: border-color 0.3s;
    }
    .payment-option:has(input:checked) { border-color: var(--gold); }
    .payment-option input[type="radio"] { accent-color: var(--gold); width: 16px; height: 16px; }

    .order-item { display: flex; gap: 0.9rem; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
    .order-item:last-child { border-bottom: none; }
    .order-item img { width: 55px; height: 55px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; }

    .phone-wrap { display: flex; gap: 0; }
    .country-code {
      background: var(--dark-3); border: 1px solid var(--border); border-right: none;
      border-radius: var(--radius-sm) 0 0 var(--radius-sm); color: var(--cream);
      padding: 0.75rem 0.85rem; font-family: 'Jost',sans-serif; font-size: 0.88rem;
      min-width: 80px; outline: none; cursor: pointer; appearance: none;
    }
    .country-code:focus { border-color: var(--gold); }
    .phone-wrap .tc-input { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }

    .guest-notice { background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); border-radius: var(--radius-sm); padding: 0.75rem 1rem; font-size: 0.82rem; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }

    @media (max-width: 768px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .form-row.three { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="toastContainer"></div>

<nav class="tc-nav">
  <div class="brand-name" style="font-size:1.2rem;">Tanushree Collections</div>
  <div class="nav-links">
    <a href="index.html">← Back to Shop</a>
  </div>
</nav>

<div class="checkout-layout">

  <!-- LEFT: FORM -->
  <div>
    <div id="guestNotice" class="guest-notice" style="display:none;">
      ℹ️ You're checking out as a guest. <a href="login.html" style="color:var(--gold);font-weight:600;margin-left:0.25rem;">Sign in</a> to track your orders.
    </div>

    <div class="tc-card" style="margin-bottom:1.2rem;">
      <h4 style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;margin-bottom:1.5rem;">Shipping Details</h4>

      <!-- Name + Phone -->
      <div class="form-row">
        <div class="form-group">
          <label class="tc-label">Full Name</label>
          <input class="tc-input" id="cName" placeholder="Your full name">
          <div class="field-error" id="nameErr"></div>
        </div>
        <div class="form-group">
          <label class="tc-label">Phone Number</label>
          <div class="phone-wrap">
            <select class="country-code" id="cCountryCode">
              <option value="+91">🇮🇳 +91</option>
              <option value="+1">🇺🇸 +1</option>
              <option value="+44">🇬🇧 +44</option>
              <option value="+971">🇦🇪 +971</option>
              <option value="+65">🇸🇬 +65</option>
              <option value="+61">🇦🇺 +61</option>
            </select>
            <input class="tc-input" id="cPhone" placeholder="10-digit number" type="tel">
          </div>
          <div class="field-error" id="phoneErr"></div>
        </div>
      </div>

      <!-- Address -->
      <div style="margin-bottom:1rem;">
        <label class="tc-label">Street / House / Flat No.</label>
        <textarea class="tc-input" id="cAddress" placeholder="House No., Street, Area" style="min-height:70px;resize:vertical;"></textarea>
        <div class="field-error" id="addrErr"></div>
      </div>

      <!-- Landmark + City -->
      <div class="form-row">
        <div class="form-group">
          <label class="tc-label">Landmark</label>
          <input class="tc-input" id="cLandmark" placeholder="Near...">
        </div>
        <div class="form-group">
          <label class="tc-label">City</label>
          <input class="tc-input" id="cCity" placeholder="City">
        </div>
      </div>

      <!-- District + State + Country -->
      <div class="form-row three">
        <div class="form-group">
          <label class="tc-label">District</label>
          <input class="tc-input" id="cDistrict" placeholder="District">
        </div>
        <div class="form-group">
          <label class="tc-label">State</label>
          <input class="tc-input" id="cState" placeholder="State">
        </div>
        <div class="form-group">
          <label class="tc-label">Country</label>
          <input class="tc-input" id="cCountry" placeholder="Country" value="India">
        </div>
      </div>

      <!-- PIN -->
      <div style="margin-bottom:0;">
        <label class="tc-label">PIN Code</label>
        <input class="tc-input" id="cPin" placeholder="6-digit PIN" type="number" style="max-width:180px;">
      </div>
    </div>

    <div class="tc-card">
      <h4 style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;margin-bottom:1rem;">Payment Method</h4>

      <label class="payment-option">
        <input type="radio" name="payment" value="COD" checked>
        <div>
          <div style="font-size:0.9rem;font-weight:500;">Cash on Delivery</div>
          <div style="font-size:0.75rem;color:var(--text-muted);">Pay when your order arrives</div>
        </div>
      </label>

      <label class="payment-option">
        <input type="radio" name="payment" value="UPI">
        <div>
          <div style="font-size:0.9rem;font-weight:500;">UPI</div>
          <div style="font-size:0.75rem;color:var(--text-muted);">Pay via UPI apps</div>
        </div>
      </label>

      <div class="gold-line"></div>
      <button class="btn-gold" id="placeBtn" onclick="placeOrder()">
        <span class="spinner" id="orderSpinner"></span>
        <span id="placeBtnText">Place Order</span>
      </button>
    </div>
  </div>

  <!-- RIGHT: SUMMARY -->
  <div>
    <div class="tc-card" style="position:sticky;top:80px;">
      <h4 style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;margin-bottom:1rem;">Order Summary</h4>
      <div id="summaryItems"></div>
      <div class="gold-line"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:0.85rem;color:var(--text-muted);">Total Amount</span>
        <span style="font-size:1.2rem;font-weight:600;color:var(--gold);" id="summaryTotal">₹0</span>
      </div>
    </div>
  </div>

</div>

<!-- Firebase SDKs BEFORE firebase-init.js -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-init.js"></script>

<script>
let currentUserId = null;

// Check auth state
function waitForFirebase(callback) {
  if (window.auth && window.db) {
    callback();
  } else {
    setTimeout(() => waitForFirebase(callback), 50);
  }
}

waitForFirebase(() => {

  window.auth.onAuthStateChanged(user => {

    if (user) {
      currentUserId = user.uid;

      window.db.collection('users').doc(user.uid).get()
        .then(doc => {

          if (!doc.exists) return;

          const data = doc.data();

          const nameInput = document.getElementById('cName');
          const phoneInput = document.getElementById('cPhone');

          if (data.name && nameInput && !nameInput.value) {
            nameInput.value = data.name;
          }

          if (data.phone && phoneInput && !phoneInput.value) {
            const phone = data.phone.replace(/^\+\d+\s?/, '');
            phoneInput.value = phone;
          }

        })
        .catch(err => {
          console.error("User fetch error:", err);
        });

    } else {
      const guestNotice = document.getElementById('guestNotice');
      if (guestNotice) guestNotice.style.display = 'flex';
    }

  });

});

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

const cart = JSON.parse(localStorage.getItem('cart') || '[]');

// Render order summary
const summaryEl = document.getElementById('summaryItems');
let total = 0;

if (cart.length === 0) {
  summaryEl.innerHTML = '<p style="color:var(--text-muted);font-size:0.88rem;">Your cart is empty.</p>';
} else {
  cart.forEach(item => {
    total += item.price * item.quantity;

    summaryEl.innerHTML += `
      <div class="order-item">
        <img src="${(item.images && item.images[0]) || 'no-image.png'}" alt="${item.name}" onerror="this.src='no-image.png'">
        <div style="flex:1;">
          <div style="font-size:0.9rem;">${item.name}</div>
          <div style="font-size:0.8rem;color:var(--text-muted);">Qty: ${item.quantity}</div>
        </div>
        <div style="color:var(--gold);font-size:0.9rem;">₹${item.price * item.quantity}</div>
      </div>`;
  });
}

document.getElementById('summaryTotal').textContent = '₹' + total;

function setErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

function clearErrors() {
  ['nameErr','phoneErr','addrErr'].forEach(id => setErr(id, ''));
}

function setLoading(on) {
  document.getElementById('placeBtn').disabled = on;
  document.getElementById('orderSpinner').classList.toggle('show', on);
  document.getElementById('placeBtnText').textContent = on ? 'Placing Order...' : 'Place Order';
}

async function placeOrder() {
  clearErrors();

  const name        = document.getElementById('cName').value.trim();
  const countryCode = document.getElementById('cCountryCode').value;
  const phone       = document.getElementById('cPhone').value.trim();
  const address     = document.getElementById('cAddress').value.trim();
  const landmark    = document.getElementById('cLandmark').value.trim();
  const city        = document.getElementById('cCity').value.trim();
  const district    = document.getElementById('cDistrict').value.trim();
  const state       = document.getElementById('cState').value.trim();
  const country     = document.getElementById('cCountry').value.trim();
  const pin         = document.getElementById('cPin').value.trim();
  const payment     = document.querySelector("input[name='payment']:checked").value;

  let valid = true;

  // ✅ Name validation
  if (!name) {
    setErr('nameErr', 'Name is required');
    valid = false;
  }

  // ✅ PHONE FIX (IMPORTANT)
  if (!/^[0-9]{10}$/.test(phone)) {
    setErr('phoneErr', 'Enter valid 10-digit phone number');
    valid = false;
  }

  // ✅ Address validation
  if (!address) {
    setErr('addrErr', 'Address is required');
    valid = false;
  }

  if (!valid) return;

  // ✅ Cart check
  if (!cart.length) {
    showToast('Your cart is empty', 'error');
    return;
  }

  setLoading(true);

  const fullPhone = countryCode + ' ' + phone;

  const addressParts = [address];
  if (landmark) addressParts.push('Near ' + landmark);
  if (city)     addressParts.push(city);
  if (district) addressParts.push(district);
  if (state)    addressParts.push(state);
  if (country)  addressParts.push(country);
  if (pin)      addressParts.push('PIN: ' + pin);

  const fullAddress = addressParts.join(', ');

  try {
    await window.db.collection('orders').add({
      userId:   currentUserId || null,
      name,
      phone:    fullPhone,
      address:  fullAddress,
      landmark, city, district, state, country,
      pin,
      payment,
      cart,
      total:    cart.reduce((s, i) => s + i.price * i.quantity, 0),
      status:   'Pending',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    localStorage.removeItem('cart');
    window.location.href = 'success.html';

  } catch (err) {
    console.error('placeOrder error:', err);
    showToast('Order failed. Please try again.', 'error');
    setLoading(false);
  }
}
</script>
</body>
</html>
