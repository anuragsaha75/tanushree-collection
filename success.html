<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Placed — Tanushree Collections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .success-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #1e2a1a 0%, #0f0a04 60%);
      padding: 2rem;
    }

    .success-card {
      text-align: center;
      max-width: 420px;
      width: 100%;
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem 2rem;
      box-shadow: var(--shadow);
    }

    .checkmark {
      width: 72px; height: 72px;
      background: rgba(76,175,128,0.12);
      border: 2px solid rgba(76,175,128,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.5rem;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--cream);
      margin-bottom: 0.5rem;
    }

    .success-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

<div class="success-wrapper">
  <div class="success-card">
    <div class="checkmark">✓</div>
    <div class="success-title">Order Placed!</div>
    <p class="success-sub">Thank you for shopping with us. Your order will be delivered soon.</p>
    <div class="gold-line"></div>
    <a href="index.html" class="btn-gold" style="display:inline-flex;text-decoration:none;width:auto;padding:0.75rem 2rem;">
      Continue Shopping
    </a>
  </div>
</div>

</body>
</html>
